name: Keep Render Service Alive

on:
  schedule:
    # every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Curl Render service URL
        run: |
          # use repo secret if present, otherwise fallback to known Render URL
          RENDER_URL="${{ secrets.RENDER_SERVICE_URL }}"
          if [ -z "$RENDER_URL" ]; then
            RENDER_URL="https://oop-autograder.onrender.com/api/health"
            echo "No secret set — falling back to $RENDER_URL"
          fi
          echo "Pinging $RENDER_URL";
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$RENDER_URL") || true
          echo "HTTP status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
            echo "Ping successful or service alive (status $STATUS)."
            exit 0
          else
            echo "Ping returned status $STATUS."
            exit 1
          fi
